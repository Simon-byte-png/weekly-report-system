name: Weekly AI Report

on:
  workflow_dispatch:
    inputs:
      end_date:
        description: "End date in Asia/Shanghai (YYYY-MM-DD); leave empty for today"
        required: false
        type: string
  schedule:
    - cron: "0 2 * * 1"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve end date
        id: date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            END_DATE="${{ github.event.inputs.end_date }}"
          else
            END_DATE=$(TZ=Asia/Shanghai date +%F)
          fi
          echo "end_date=$END_DATE" >> "$GITHUB_OUTPUT"

      - name: Generate markdown
        shell: bash
        run: |
          mkdir -p outputs
          ./weekly-report run \
            --end-date "${{ steps.date.outputs.end_date }}" \
            --window-days 7 \
            --tz Asia/Shanghai \
            --config config/weekly-report.json \
            --output "outputs/weekly-report-${{ steps.date.outputs.end_date }}.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ steps.date.outputs.end_date }}
          path: outputs/weekly-report-${{ steps.date.outputs.end_date }}.md
